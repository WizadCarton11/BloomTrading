global:
  scrape_interval: 15s  # How frequently to scrape targets

scrape_configs:
  - job_name: 'frontend'
    static_configs:
      - targets: ['localhost:3000']  # Adjust to your frontend service
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['localhost:9187']  # Only if you're running postgres exporter

  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']  # Jaeger metrics port

  - job_name: 'minio'
    metrics_path: /minio/prometheus/metrics
    static_configs:
      - targets: ['minio:6000']
